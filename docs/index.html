<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wusel Capture</title>
    <meta
      name="description"
      content="Mark up any web page in your browser, and let your AI implement the change."
    />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #fff;
        --fg: #1a1a1a;
        --muted: #5c5c5c;
        --rule: #e4e4e4;
        --accent: #6d28d9;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #131316;
          --fg: #ececee;
          --muted: #a0a0a8;
          --rule: #2b2b31;
          --accent: #a78bfa;
        }
      }
      body {
        margin: 0;
        padding: 5rem 1.25rem;
        background: var(--bg);
        color: var(--fg);
        font: 16px/1.65 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial,
          sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      main {
        max-width: 34rem;
        margin: 0 auto;
      }
      h1 {
        font-size: 2rem;
        letter-spacing: -0.02em;
        margin: 0 0 0.5rem;
      }
      .tagline {
        color: var(--muted);
        font-size: 1.05rem;
        margin: 0 0 2.5rem;
      }
      a {
        color: var(--accent);
      }
      ul {
        list-style: none;
        padding: 0;
        margin: 0;
        border-top: 1px solid var(--rule);
      }
      li {
        border-bottom: 1px solid var(--rule);
      }
      li a {
        display: block;
        padding: 0.9rem 0;
        text-decoration: none;
        font-weight: 500;
      }
      li a:hover {
        text-decoration: underline;
      }
      li span {
        display: block;
        color: var(--muted);
        font-weight: 400;
        font-size: 0.92rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Wusel Capture</h1>
      <p class="tagline">
        Mark up any web page in your browser, and let your AI implement the change.
      </p>
      <ul>
        <li>
          <a href="./privacy.html"
            >Privacy Policy <span>What the extension handles, and why none of it reaches us.</span></a
          >
        </li>
        <li>
          <a href="https://github.com/secretlifeof/wusel-capture"
            >Source code <span>Open source, MIT licensed.</span></a
          >
        </li>
      </ul>
    </main>
  </body>
</html>
